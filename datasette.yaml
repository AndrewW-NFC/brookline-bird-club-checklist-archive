extra_css_urls:
  - /static/bbc-datasette.css

title: Brookline Bird Club eBird Archive
description: |
  A searchable prototype built from the Brookline Bird Club eBird account export.

  Start with Search Bird Records, Browse Checklists, Species Summary, or Places and Locations.

  The underlying records reflect decades of BBC record keeping, historical trip documentation, eBird checklist entry, and the club statistician's long-running work to collate and preserve those records.

  Some historical records use broad eBird locations. Checklist comments may provide better detail about the actual places visited.

databases:
  bbc-ebird-archive:
    title: Brookline Bird Club eBird Archive
    description: |
      Prototype Datasette database for exploring Brookline Bird Club checklist and observation data.
      Start with the public entry points below; source tables remain available for deeper review.

    tables:
      search_species_records:
        title: Search Bird Records
        description: |
          Individual observation records, searchable by species, date, county, location, count, protocol, breeding code, observation details, and checklist comments.
        facets:
          - Common Name
          - County
          - Decade
          - Month
          - Location Precision
          - Protocol
          - Presence Only

      browse_checklists:
        title: Browse Checklists
        description: |
          One row per eBird checklist, with date, location, effort, species total, comments, and a link back to eBird.
        sort_desc: Date
        facets:
          - County
          - Decade
          - Month
          - Protocol
          - Location Precision

      browse_locations:
        title: Places and Locations
        description: |
          One row per eBird location used by the Brookline Bird Club account. Location Precision is a derived helper for broad or generic locations.
        facets:
          - County
          - Location Precision

      browse_species_summary:
        title: Species Summary
        description: |
          One row per species, with observation totals, checklist totals, first date, last date, and high count.
        sort: Taxonomic Order

      broad_location_checklists:
        title: Broad Or Route Location Checklists
        description: |
          Checklists where the formal eBird location appears broad, generic, route-like, or county-level.
        facets:
          - County
          - Decade
          - Month
          - Location Precision
          - Protocol

      high_counts:
        title: Highest Counts
        description: |
          Numeric observation records sorted by count.
        sort_desc: Numeric Count
        facets:
          - Common Name
          - County
          - Decade
          - Month
          - Location Precision

      earliest_records_by_species:
        title: First Dated Records by Species
        description: |
          The earliest dated Brookline Bird Club record for each species in this export. Useful as archive leads, not final species-account judgments.
        sort: Taxonomic Order

      latest_records_by_species:
        title: Latest Dated Records by Species
        description: |
          The most recent dated Brookline Bird Club record for each species in this export.
        sort: Taxonomic Order

      historical_field_card_checklists:
        title: Historical Field Card Checklists
        description: |
          Checklists using the Historical protocol or comments that appear to reference BBC field card data.
        sort: Date
        facets:
          - County
          - Decade
          - Month
          - Location Precision

      comment_search_helper:
        title: Search Comments and Notes
        description: |
          Checklist comments and observation details combined in one table.
        facets:
          - County
          - Decade
          - Month
          - Source Type

      observations:
        title: Source Table - Observations
        description: |
          Source observation table. This remains available for diagnostics and deeper archive work, but most visitors should begin with Search Bird Records.

      checklists:
        title: Source Table - Checklists
        description: |
          Source checklist table. This is useful for diagnostics and development, but most visitors should use Browse Checklists.

      locations:
        title: Source Table - Locations
        description: |
          Source location summary table. Most visitors should use Places and Locations.

      species:
        title: Source Table - Species
        description: |
          Source species summary table. Most visitors should use Species Summary.

      import_warnings:
        title: Import Warnings
        description: |
          Import quality-control counts. Useful for checking date parsing, count parsing, broad locations, and missing coordinates.
